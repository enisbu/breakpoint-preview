<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakpoint Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      background: #050505;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Bottom Bar */
    .toolbar {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 0 10px;
      gap: 2px;
      flex-shrink: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      order: 1;
    }

    .toolbar-logo {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      margin-right: auto;
      opacity: 0.5;
      transition: opacity 0.15s ease;
    }
    .toolbar-logo:hover {
      opacity: 0.8;
    }

    .btn {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.01em;
      padding: 4px 10px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    /* Viewport Grid */
    .viewport-container {
      flex: 1;
      display: flex;
      gap: 6px;
      padding: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      align-items: stretch;
    }
    .viewport-container::-webkit-scrollbar { height: 6px; }
    .viewport-container::-webkit-scrollbar-track { background: transparent; }
    .viewport-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
    }
    .viewport-container::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Viewport Frame */
    .viewport-frame {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #0a0a0a;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      overflow: hidden;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    }

    /* Viewport Header */
    .viewport-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 36px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 12px;
      flex-shrink: 0;
      gap: 8px;
    }

    .viewport-label-width {
      font-weight: 600;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .viewport-label-sep {
      color: rgba(255, 255, 255, 0.15);
      font-weight: 400;
    }

    .viewport-label-name {
      color: rgba(255, 255, 255, 0.3);
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .viewport-url-bar {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      padding: 2px 8px;
      transition: all 0.15s ease;
    }
    .viewport-url-bar:hover {
      border-color: rgba(255, 255, 255, 0.08);
    }
    .viewport-url-bar:focus-within {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
    }
    .viewport-url-prefix {
      color: rgba(255, 255, 255, 0.15);
      white-space: nowrap;
      pointer-events: none;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 50%;
    }
    .viewport-url-slash {
      color: rgba(255, 255, 255, 0.15);
      flex-shrink: 0;
      pointer-events: none;
    }
    .viewport-url-input {
      flex: 1;
      min-width: 60px;
      font: inherit;
      color: rgba(255, 255, 255, 0.35);
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
    }
    .viewport-url-input:focus {
      color: rgba(255, 255, 255, 0.85);
    }

    /* Hide Button */
    .viewport-hide-btn {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    .viewport-hide-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.7);
    }

    .viewport-label-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    /* Disabled / Collapsed — full-height pill */
    .viewport-frame.disabled {
      width: 36px !important;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.06);
      border-radius: 18px;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s ease, border-color 0.2s ease;
    }
    .viewport-frame.disabled:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.12);
    }
    .viewport-frame.disabled iframe { display: none; }
    .viewport-frame.disabled .viewport-label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      padding: 0;
      justify-content: center;
      align-items: center;
      gap: 0;
      height: 100%;
      background: transparent;
      border: none;
    }
    .viewport-frame.disabled .viewport-label-width {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.04em;
      transition: color 0.2s ease;
    }
    .viewport-frame.disabled:hover .viewport-label-width {
      color: rgba(255, 255, 255, 0.6);
    }
    .viewport-frame.disabled .viewport-label-sep { display: none; }
    .viewport-frame.disabled .viewport-label-name { display: none; }
    .viewport-frame.disabled .viewport-label-right { display: none; }
    .viewport-frame.disabled .viewport-url-bar { display: none; }

    /* Light theme collapsed */
    body.light .viewport-frame.disabled {
      background: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.08);
    }
    body.light .viewport-frame.disabled:hover {
      background: rgba(0, 0, 0, 0.06);
      border-color: rgba(0, 0, 0, 0.14);
    }
    body.light .viewport-frame.disabled .viewport-label-width {
      color: rgba(0, 0, 0, 0.3);
    }
    body.light .viewport-frame.disabled:hover .viewport-label-width {
      color: rgba(0, 0, 0, 0.55);
    }

    /* Iframe */
    .viewport-frame iframe {
      flex: 1;
      border: none;
      background: #fff;
      scrollbar-width: none;
    }
    .viewport-frame iframe::-webkit-scrollbar {
      display: none;
    }

    /* Empty State */
    .no-url {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .no-url h2 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.4);
    }
    .no-url p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.2);
      line-height: 1.6;
    }
    .no-url code {
      background: rgba(255, 255, 255, 0.05);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* Light theme */
    body.light { background: #e5e5e5; }
    body.light .viewport-frame { background: #fff; border-color: rgba(0,0,0,0.1); }
    body.light .viewport-label { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.06); }
    body.light .viewport-label-width { color: rgba(0,0,0,0.45); }
    body.light .viewport-label-sep { color: rgba(0,0,0,0.15); }
    body.light .viewport-label-name { color: rgba(0,0,0,0.3); }
    body.light .viewport-url-bar { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.06); }
    body.light .viewport-url-bar:hover { border-color: rgba(0,0,0,0.1); }
    body.light .viewport-url-bar:focus-within { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.12); }
    body.light .viewport-url-prefix { color: rgba(0,0,0,0.2); }
    body.light .viewport-url-slash { color: rgba(0,0,0,0.2); }
    body.light .viewport-url-input { color: rgba(0,0,0,0.35); }
    body.light .viewport-url-input:focus { color: rgba(0,0,0,0.8); }
    body.light .viewport-hide-btn { color: rgba(0,0,0,0.3); }
    body.light .toolbar { border-color: rgba(0,0,0,0.08); }
    body.light .btn { color: rgba(0,0,0,0.4); }
    body.light .btn:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.7); }

    /* Active toggle state */
    .btn[data-active="true"] {
      background: rgba(100, 200, 100, 0.12);
      color: rgba(100, 220, 100, 0.9);
    }
    .btn[data-active="true"]:hover {
      background: rgba(100, 200, 100, 0.2);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <img class="toolbar-logo" src="/icon.png" alt="Breakpoint Preview">
    <button class="btn" onclick="refreshAll()">Refresh</button>
    <button class="btn" onclick="toggleScrollSync()" id="sync-btn">Sync Scroll</button>
    <button class="btn" onclick="toggleTheme()" id="theme-btn">Theme: Dark</button>
  </div>

  <div class="viewport-container" id="viewports"></div>

  <script>
    var DEFAULT_BREAKPOINTS = [
      { width: 375, name: 'Mobile' },
      { width: 768, name: 'Tablet' },
      { width: 1024, name: 'Laptop' },
      { width: 1440, name: 'Desktop' },
    ];

    var BREAKPOINT_NAMES = {
      320: 'Small Mobile', 375: 'Mobile', 390: 'Mobile', 414: 'Mobile L',
      430: 'Mobile XL', 640: 'Small Tablet', 768: 'Tablet', 1024: 'Laptop',
      1280: 'Desktop', 1440: 'Desktop L', 1920: 'Full HD', 2560: 'Ultra Wide',
    };

    var scrollSyncEnabled = false;
    var darkTheme = localStorage.getItem('bp-theme') !== 'light';

    function getParams() {
      var params = new URLSearchParams(window.location.search);
      var url = params.get('url') || window.location.origin + '/';
      var bpParam = params.get('breakpoints');
      var breakpoints;
      if (bpParam) {
        breakpoints = bpParam.split(',').map(function(w) {
          var width = parseInt(w.trim(), 10);
          return { width: width, name: BREAKPOINT_NAMES[width] || width + 'px' };
        }).filter(function(bp) { return !isNaN(bp.width); });
      } else {
        breakpoints = DEFAULT_BREAKPOINTS;
      }
      var initPath = params.get('path') || '/';
      var origin = params.get('origin') || '';
      return { url: url, breakpoints: breakpoints, initPath: initPath, origin: origin };
    }

    function renderViewports(url, breakpoints, origin, initPath) {
      var container = document.getElementById('viewports');

      if (url && !/^https?:\/\//i.test(url)) {
        container.innerHTML = '<div class="no-url"><div><h2>Invalid URL</h2><p>Only <code>http://</code> and <code>https://</code> URLs are supported.</p></div></div>';
        return;
      }
      if (!url) {
        container.innerHTML = '<div class="no-url"><div><h2>No URL</h2><p>Usage: <code>breakpoint-preview http://localhost:3000</code></p></div></div>';
        return;
      }

      container.innerHTML = '';

      breakpoints.forEach(function(bp) {
        var frame = document.createElement('div');
        frame.className = 'viewport-frame';
        frame.style.width = (bp.width + 2) + 'px';

        var label = document.createElement('div');
        label.className = 'viewport-label';

        var labelLeft = document.createElement('span');
        labelLeft.innerHTML = '<span class="viewport-label-width">' + bp.width + 'px</span> <span class="viewport-label-sep">/</span> <span class="viewport-label-name">' + bp.name + '</span>';

        var labelRight = document.createElement('span');
        labelRight.className = 'viewport-label-right';

        var isEnabled = sessionStorage.getItem('bp-disabled-' + bp.width) !== '1';

        var hideBtn = document.createElement('button');
        hideBtn.className = 'viewport-hide-btn';
        hideBtn.textContent = 'Hide';
        hideBtn.onclick = function(e) {
          e.stopPropagation();
          frame.classList.add('disabled');
          frame.dataset.origWidth = frame.style.width;
          sessionStorage.setItem('bp-disabled-' + bp.width, '1');
          var next = frame.nextElementSibling;
          while (next && next.classList.contains('disabled')) next = next.nextElementSibling;
          if (next) scrollAfterTransition(frame, next);
        };
        labelRight.appendChild(hideBtn);

        var urlBar = document.createElement('span');
        urlBar.className = 'viewport-url-bar';
        if (origin) {
          var prefix = document.createElement('span');
          prefix.className = 'viewport-url-prefix';
          prefix.textContent = origin.replace(/^https?:\/\//, '');
          urlBar.appendChild(prefix);
        }
        var slash = document.createElement('span');
        slash.className = 'viewport-url-slash';
        slash.textContent = '/';
        urlBar.appendChild(slash);
        var urlInput = document.createElement('input');
        urlInput.className = 'viewport-url-input';
        urlInput.value = initPath.replace(/^\//, '');
        urlInput.spellcheck = false;
        urlInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            var val = urlInput.value.trim();
            var p = val.startsWith('/') ? val : '/' + val;
            iframe.src = url.replace(/\/$/, '') + p;
            urlInput.blur();
          }
        });
        urlBar.appendChild(urlInput);

        label.appendChild(labelLeft);
        label.appendChild(urlBar);
        label.appendChild(labelRight);

        frame.addEventListener('click', function() {
          if (!frame.classList.contains('disabled')) return;
          frame.classList.remove('disabled');
          frame.style.width = frame.dataset.origWidth || (bp.width + 2) + 'px';
          sessionStorage.setItem('bp-disabled-' + bp.width, '0');
          scrollAfterTransition(frame, frame);
        });

        var iframe = document.createElement('iframe');
        var saved = sessionStorage.getItem('bp-iframe-' + bp.width);
        iframe.src = saved || url.replace(/\/$/, '') + initPath;
        iframe.style.width = bp.width + 'px';
        iframe.setAttribute('loading', 'lazy');
        iframe.dataset.bpWidth = bp.width;

        iframe.addEventListener('load', function() {
          try { urlInput.value = iframe.contentWindow.location.pathname.replace(/^\//, ''); } catch(e) {}
        });

        if (!isEnabled) {
          frame.classList.add('disabled');
          frame.dataset.origWidth = frame.style.width;
        }

        frame.appendChild(label);
        frame.appendChild(iframe);
        container.appendChild(frame);
        cachedIframes.push(iframe);
      });
    }

    function scrollAfterTransition(source, target) {
      source.addEventListener('transitionend', function once(e) {
        if (e.propertyName !== 'width') return;
        source.removeEventListener('transitionend', once);
        target.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      });
    }

    var params = getParams();
    var cachedIframes = [];

    var lastTarget = sessionStorage.getItem('bp-target');
    if (lastTarget !== params.url) {
      Object.keys(sessionStorage).forEach(function(k) {
        if (k.startsWith('bp-')) sessionStorage.removeItem(k);
      });
      sessionStorage.setItem('bp-target', params.url);
    }

    window.addEventListener('beforeunload', function() {
      cachedIframes.forEach(function(iframe) {
        try {
          var origin = new URL(iframe.src).origin;
          sessionStorage.setItem('bp-iframe-' + iframe.dataset.bpWidth, origin + iframe.contentWindow.location.pathname);
        } catch(e) {}
      });
    });

    function refreshAll() {
      cachedIframes.forEach(function(f) { f.src = f.src; });
    }

    function applyTheme() {
      document.getElementById('theme-btn').textContent = 'Theme: ' + (darkTheme ? 'Dark' : 'Light');
      document.body.classList.toggle('light', !darkTheme);
    }

    function toggleTheme() {
      darkTheme = !darkTheme;
      localStorage.setItem('bp-theme', darkTheme ? 'dark' : 'light');
      applyTheme();
    }

    function toggleScrollSync() {
      scrollSyncEnabled = !scrollSyncEnabled;
      var btn = document.getElementById('sync-btn');
      btn.textContent = 'Sync Scroll' + (scrollSyncEnabled ? ': On' : ': Off');
      btn.setAttribute('data-active', scrollSyncEnabled);
    }

    window.addEventListener('message', function(e) {
      if (!scrollSyncEnabled || !e.data || e.data.type !== 'bp-scroll') return;
      cachedIframes.forEach(function(iframe) {
        if (iframe.contentWindow === e.source) return;
        iframe.contentWindow.postMessage({ type: 'bp-scroll-set', ratio: e.data.ratio }, '*');
      });
    });

    applyTheme();
    renderViewports(params.url, params.breakpoints, params.origin, params.initPath);
  </script>
</body>
</html>
